<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>사랑하는 서연이의 단어 공부장</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream:#fdf8f2; --warm:#f5ebe0; --peach:#f2c4a0;
  --rose:#e8927c;  --burg:#a84c4c; --ink:#2d1f1f;
  --ink2:#5a3e3e;  --soft:#9b7272; --white:#ffffff;
  --shadow:rgba(168,76,76,.13);
}
*{box-sizing:border-box;margin:0;padding:0;}
body { font-family:'Gowun Dodum',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; position:relative; overflow-x:hidden; }
.bg-deco { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.bg-paw { position:absolute; font-size:1.6rem; opacity:0.07; transform:rotate(var(--r,0deg)); animation:floatPaw 12s ease-in-out infinite; animation-delay:var(--d,0s); }
@keyframes floatPaw { 0%,100%{transform:translateY(0) rotate(var(--r,0deg));}50%{transform:translateY(-10px) rotate(var(--r,0deg));} }
.header { position:relative; z-index:1; text-align:center; padding:2rem 1rem 0.5rem; }
.header-top { display:flex; justify-content:center; align-items:center; gap:10px; margin-bottom:4px; }
.header-paw { font-size:1.4rem; animation:wiggle 2s ease-in-out infinite; }
@keyframes wiggle{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.header-sub { font-family:'Nanum Pen Script',cursive; font-size:1rem; color:var(--rose); letter-spacing:2px; margin-bottom:3px; }
.header-title { font-family:'DM Serif Display',serif; font-size:1.5rem; color:var(--burg); line-height:1.35; word-break:keep-all; }
.header-line { width:50px; height:2px; background:linear-gradient(90deg,var(--peach),var(--rose)); border-radius:2px; margin:.7rem auto 0; }
.tabs { position:relative; z-index:1; display:flex; max-width:480px; margin:1rem auto 0; padding:0 .8rem; gap:3px; }
.tab-btn { flex:1; padding:.5rem .1rem; border:none; background:var(--warm); color:var(--soft); font-family:'Gowun Dodum',sans-serif; font-size:.72rem; border-radius:10px 10px 0 0; cursor:pointer; transition:all .2s; white-space:nowrap; }
.tab-btn.active { background:var(--white); color:var(--burg); font-weight:700; box-shadow:0 -2px 8px var(--shadow); }
.container { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:0 .8rem 5rem; }
.panel { display:none; background:var(--white); border-radius:0 0 18px 18px; padding:1.3rem 1.1rem; box-shadow:0 4px 24px var(--shadow); animation:fadeUp .22s ease; }
.panel.active { display:block; }
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.sec-title { font-family:'DM Serif Display',serif; font-size:1.05rem; color:var(--burg); margin-bottom:.9rem; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.sec-title small { font-family:'Gowun Dodum',sans-serif; font-size:.78rem; color:var(--soft); font-weight:400; }
label { display:block; font-size:.8rem; color:var(--soft); margin:.8rem 0 3px; }
input[type=text],select { width:100%; padding:.62rem .85rem; border:1.5px solid var(--warm); border-radius:9px; font-family:'Gowun Dodum',sans-serif; font-size:.93rem; color:var(--ink); background:var(--cream); outline:none; transition:border-color .2s; }
input[type=text]:focus,select:focus { border-color:var(--rose); background:#fff; }
.btn { display:block; width:100%; padding:.75rem; border:none; border-radius:11px; font-family:'Gowun Dodum',sans-serif; font-size:.95rem; font-weight:700; cursor:pointer; transition:all .18s; margin-top:.55rem; }
.btn-primary  { background:var(--burg); color:#fff; }
.btn-primary:hover { background:#8f3c3c; transform:translateY(-1px); }
.btn-secondary { background:var(--warm); color:var(--burg); }
.btn-secondary:hover { background:var(--peach); }
.btn-outline { background:transparent; border:1.5px solid var(--rose); color:var(--rose); }
.btn-outline:hover { background:var(--rose); color:#fff; }
.btn-ghost { background:transparent; border:1.5px solid var(--warm); color:var(--soft); }
.btn-ghost:hover { background:var(--warm); }
.btn-danger { background:#d94f4f; color:#fff; }
.btn-danger:hover { background:#b83c3c; transform:translateY(-1px); }
.btn-sm { display:inline-block; width:auto; padding:.35rem .85rem; font-size:.78rem; margin-top:0; }
.btn-row { display:flex; gap:7px; margin-top:.7rem; }
.btn-row .btn { margin-top:0; }
.radio-group { display:flex; gap:7px; margin-bottom:.9rem; }
.radio-group label { flex:1; margin:0; padding:.5rem; text-align:center; border:1.5px solid var(--warm); border-radius:9px; cursor:pointer; color:var(--soft); font-size:.85rem; transition:all .18s; }
.radio-group input { display:none; }
.radio-group input:checked+label { background:var(--burg); border-color:var(--burg); color:#fff; font-weight:700; }
.pills { display:flex; gap:5px; margin-bottom:.9rem; }
.pill { flex:1; padding:.42rem .2rem; text-align:center; border:1.5px solid var(--warm); border-radius:50px; font-size:.8rem; color:var(--soft); cursor:pointer; transition:all .18s; background:var(--cream); }
.pill.active { background:var(--rose); border-color:var(--rose); color:#fff; font-weight:700; }
.filter-row { display:flex; gap:7px; margin-bottom:.8rem; }
.filter-row select { flex:1; margin-top:0; }
.prog-row { display:flex; justify-content:space-between; font-size:.8rem; color:var(--soft); margin-bottom:.4rem; }
.prog-wrap { width:100%; height:5px; background:var(--warm); border-radius:10px; margin-bottom:1rem; }
.prog-fill { height:100%; background:linear-gradient(90deg,var(--peach),var(--rose)); border-radius:10px; transition:width .4s ease; }
.flashcard { background:linear-gradient(145deg,#2d1f1f 0%,#a84c4c 100%); border-radius:20px; padding:2.5rem 1.4rem 2.2rem; text-align:center; min-height:210px; display:flex; flex-direction:column; justify-content:center; align-items:center; box-shadow:0 8px 28px rgba(168,76,76,.28); position:relative; overflow:hidden; }
.flashcard::before { content:'🐾'; position:absolute; top:12px; right:16px; font-size:1.2rem; opacity:.18; }
.flashcard::after  { content:'🐾'; position:absolute; bottom:12px; left:16px; font-size:1rem; opacity:.13; transform:rotate(20deg); }
.card-lbl  { font-size:.68rem; color:rgba(255,255,255,.45); letter-spacing:3px; text-transform:uppercase; margin-bottom:.7rem; }
.card-word { font-family:'DM Serif Display',serif; font-size:2.5rem; color:#fff; line-height:1.1; }
.card-mean { font-size:1.35rem; color:var(--peach); margin-top:.9rem; font-weight:700; animation:fadeUp .3s ease; }
.card-src  { font-size:.72rem; color:rgba(255,255,255,.35); margin-top:.5rem; }
.tbl-wrap { overflow-x:auto; border-radius:10px; border:1.5px solid var(--warm); }
table.wtbl { width:100%; border-collapse:collapse; font-size:.84rem; min-width:340px; }
table.wtbl thead tr { background:var(--warm); }
table.wtbl th { padding:.55rem .5rem; text-align:left; font-size:.74rem; color:var(--burg); font-weight:700; white-space:nowrap; }
table.wtbl td { padding:.6rem .5rem; border-bottom:1px solid var(--warm); color:var(--ink2); vertical-align:middle; }
table.wtbl tr:last-child td { border-bottom:none; }
table.wtbl tr.selected td { background:#fff0f0; }
table.wtbl tr:hover td { background:var(--cream); }
.td-check { width:28px; text-align:center; }
.td-check input[type=checkbox] { width:15px; height:15px; accent-color:var(--burg); cursor:pointer; }
.word-en { font-family:'DM Serif Display',serif; color:var(--burg); font-size:.98rem; }
.src-badge { display:inline-block; background:var(--warm); color:var(--soft); font-size:.68rem; padding:2px 7px; border-radius:50px; white-space:nowrap; }
.sound-btns { display:flex; gap:4px; }
.snd-btn { background:var(--warm); border:none; border-radius:6px; padding:3px 7px; font-size:.72rem; color:var(--burg); cursor:pointer; transition:all .15s; white-space:nowrap; }
.snd-btn:hover { background:var(--peach); }
.tbl-footer { display:flex; justify-content:space-between; align-items:center; margin-top:.6rem; flex-wrap:wrap; gap:6px; }
.tbl-count { font-size:.8rem; color:var(--soft); }
.tbl-actions { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
.wrong-card { background:var(--cream); border:1.5px solid var(--warm); border-radius:13px; padding:.9rem 1rem; margin-bottom:.7rem; display:flex; justify-content:space-between; align-items:center; gap:.7rem; }
.wrong-word { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--burg); }
.wrong-mean { font-size:.85rem; color:var(--ink2); margin-top:2px; }
.wrong-meta { font-size:.72rem; color:var(--soft); margin-top:4px; display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.cnt-badge { background:var(--burg); color:#fff; font-size:.7rem; padding:2px 8px; border-radius:50px; white-space:nowrap; }
.summary-chip { display:inline-flex; align-items:center; gap:5px; background:var(--warm); border-radius:50px; padding:.38rem .9rem; font-size:.82rem; color:var(--burg); font-weight:700; margin-bottom:.9rem; }
.toast { position:fixed; bottom:1.4rem; left:50%; transform:translateX(-50%) translateY(70px); background:var(--burg); color:#fff; padding:.65rem 1.4rem; border-radius:50px; font-size:.88rem; z-index:999; transition:transform .3s ease; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,.2); }
.toast.show { transform:translateX(-50%) translateY(0); }
.modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:900; justify-content:center; align-items:flex-end; }
.modal-ov.show { display:flex; }
.modal-box { background:#fff; border-radius:20px 20px 0 0; padding:1.8rem 1.4rem; width:100%; max-width:480px; text-align:center; animation:slideUp .25s ease; }
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title { font-family:'DM Serif Display',serif; font-size:1.15rem; color:var(--burg); margin-bottom:.4rem; }
.modal-desc { font-size:.88rem; color:var(--soft); margin-bottom:1.4rem; white-space:pre-line; }
.modal-title-danger { font-family:'DM Serif Display',serif; font-size:1.15rem; color:#d94f4f; margin-bottom:.4rem; }
input[type=file] { width:100%; padding:.58rem; border:1.5px dashed var(--peach); border-radius:9px; background:var(--cream); font-size:.83rem; color:var(--soft); cursor:pointer; }
.img-preview { width:100%; border-radius:11px; margin:.7rem 0; display:none; object-fit:cover; max-height:200px; }
.ocr-loading { text-align:center; padding:1.5rem; color:var(--soft); font-size:.9rem; display:none; }
.ocr-loading .spin { font-size:1.8rem; display:block; animation:spin 1s linear infinite; margin-bottom:.5rem; }
@keyframes spin { to { transform:rotate(360deg); } }
.review-table { width:100%; border-collapse:collapse; margin-bottom:.8rem; }
.review-table th { background:var(--warm); color:var(--burg); font-size:.75rem; padding:.5rem .4rem; text-align:left; }
.review-table td { padding:.4rem; border-bottom:1px solid var(--warm); vertical-align:middle; }
.review-table tr:last-child td { border-bottom:none; }
.review-input { width:100%; padding:.38rem .5rem; border:1.5px solid var(--warm); border-radius:7px; font-family:'Gowun Dodum',sans-serif; font-size:.85rem; color:var(--ink); background:#fff; outline:none; }
.review-input:focus { border-color:var(--rose); }
.review-del { background:none; border:none; color:#d94f4f; font-size:1.1rem; cursor:pointer; padding:0 .3rem; }
.review-add { display:flex; justify-content:center; margin-bottom:.8rem; }
.empty { text-align:center; padding:2.5rem 1rem; color:var(--soft); }
.empty .ei { font-size:2.2rem; margin-bottom:.4rem; }
.complete { text-align:center; padding:1.8rem 1rem; }
.complete .ce { font-size:2.8rem; margin-bottom:.4rem; }
.complete h3 { font-family:'DM Serif Display',serif; font-size:1.35rem; color:var(--burg); margin-bottom:.4rem; }
.complete p { font-size:.88rem; color:var(--soft); margin-bottom:1.1rem; }
.mode-cards { display:flex; gap:9px; margin-bottom:1rem; }
.mode-card { flex:1; border:2px solid var(--warm); border-radius:13px; padding:.8rem .5rem; text-align:center; cursor:pointer; transition:all .2s; background:var(--cream); }
.mode-card.active { border-color:var(--burg); background:#fff5f5; }
.mode-card .mc-icon { font-size:1.5rem; margin-bottom:4px; }
.mode-card .mc-lbl { font-size:.78rem; color:var(--soft); font-weight:700; }
.mode-card.active .mc-lbl { color:var(--burg); }
.checklist-wrap { border:1.5px solid var(--warm); border-radius:10px; overflow:hidden; max-height:260px; overflow-y:auto; margin-bottom:.8rem; }
.check-item { display:flex; align-items:center; gap:10px; padding:.6rem .9rem; border-bottom:1px solid var(--warm); cursor:pointer; transition:background .15s; }
.check-item:last-child { border-bottom:none; }
.check-item:hover { background:var(--cream); }
.check-item input[type=checkbox] { width:16px; height:16px; accent-color:var(--burg); flex-shrink:0; }
.check-item .ci-word { font-family:'DM Serif Display',serif; color:var(--burg); font-size:.98rem; }
.check-item .ci-mean { font-size:.78rem; color:var(--soft); }
.check-sel-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:.4rem; font-size:.8rem; color:var(--soft); }
</style>
</head>
<body>

<div class="bg-deco" id="bgDeco"></div>

<div class="header">
  <div class="header-top">
    <span class="header-paw">🐾</span>
    <span class="header-paw" style="animation-delay:.4s">🐶</span>
    <span class="header-paw" style="animation-delay:.8s">🐾</span>
  </div>
  <p class="header-sub">✨ study with love ✨</p>
  <h1 class="header-title">사랑하는 서연이의<br>단어 공부장</h1>
  <div class="header-line"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('input',this)">✏️ 입력</button>
  <button class="tab-btn"        onclick="switchTab('list',this)">📋 단어장</button>
  <button class="tab-btn"        onclick="switchTab('quiz',this)">🎯 퀴즈</button>
  <button class="tab-btn"        onclick="switchTab('wrong',this)">❌ 오답노트</button>
</div>

<div class="container">

<!-- TAB 1 -->
<div id="panel-input" class="panel active">
  <p class="sec-title">📝 새 단어 추가</p>
  <div class="radio-group">
    <input type="radio" name="imode" id="mManual" value="manual" checked>
    <label for="mManual">✍️ 직접 입력</label>
    <input type="radio" name="imode" id="mOCR" value="ocr">
    <label for="mOCR">📷 이미지 OCR</label>
  </div>
  <div id="secManual">
    <label>🔤 영어 단어 <span style="color:var(--rose)">*</span></label>
    <input type="text" id="iWord" placeholder="예) ephemeral"/>
    <label>🇰🇷 한국어 뜻 <span style="color:var(--rose)">*</span></label>
    <input type="text" id="iMeaning" placeholder="예) 일시적인, 덧없는"/>
    <label>📌 출처 <span style="color:var(--soft);font-size:.73rem">(선택)</span></label>
    <input type="text" id="iSource" placeholder="예) voca100 - day1"/>
    <button class="btn btn-primary" onclick="saveWord()" style="margin-top:1.1rem">🐾 저장하기</button>
  </div>
  <div id="secOCR" style="display:none">
    <label>📷 교재 사진 업로드</label>
    <input type="file" accept="image/*" id="ocrFile" onchange="previewImg(event)"/>
    <img id="imgPreview" class="img-preview"/>
    <button class="btn btn-secondary" id="ocrBtn" onclick="runOCR()" style="display:none">🤖 AI로 단어 자동 추출</button>
    <div class="ocr-loading" id="ocrLoading">
      <span class="spin">⚙️</span>
      AI가 단어를 분석하고 있어요...<br>
      <small style="font-size:.78rem">10~20초 정도 걸려요</small>
    </div>
    <div id="ocrReview" style="display:none">
      <p style="font-size:.82rem;color:var(--soft);margin:.8rem 0 .4rem">📝 추출된 단어를 확인하고 수정해주세요</p>
      <label>📌 출처 <span style="color:var(--soft);font-size:.73rem">(선택 · 전체 적용)</span></label>
      <input type="text" id="ocrSource" placeholder="예) voca100 - day1"/>
      <div style="margin-top:.8rem">
        <table class="review-table">
          <thead><tr>
            <th style="width:38%">영어 단어</th>
            <th style="width:46%">한국어 뜻</th>
            <th style="width:16%">삭제</th>
          </tr></thead>
          <tbody id="reviewBody"></tbody>
        </table>
      </div>
      <div class="review-add">
        <button class="btn btn-ghost btn-sm" onclick="addReviewRow()">＋ 행 추가</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="resetOCR()">🔄 다시 찍기</button>
        <button class="btn btn-primary"   onclick="saveAllOCR()">✅ 전체 저장</button>
      </div>
    </div>
  </div>
</div>

<!-- TAB 2 -->
<div id="panel-list" class="panel">
  <p class="sec-title">📋 전체 단어장 <small id="listCountBadge">( 0개 단어 )</small></p>
  <div class="filter-row">
    <select id="listDate" onchange="renderList()"><option value="all">📅 전체 날짜</option></select>
    <select id="listSrc"  onchange="renderList()"><option value="all">📌 전체 출처</option></select>
  </div>
  <div id="listContainer"></div>
  <div class="tbl-footer" id="listFooter" style="display:none">
    <span class="tbl-count" id="listSelInfo"></span>
    <div class="tbl-actions">
      <button class="btn btn-ghost btn-sm"  onclick="selectAllList()">전체선택</button>
      <button class="btn btn-ghost btn-sm"  onclick="clearSelList()">선택해제</button>
      <button class="btn btn-danger btn-sm" onclick="openDeleteModal()">🗑️ 선택삭제</button>
    </div>
  </div>
</div>

<!-- TAB 3 -->
<div id="panel-quiz" class="panel">
  <p class="sec-title">🎯 플래시카드 퀴즈</p>
  <div id="quizSetup">
    <p style="font-size:.82rem;color:var(--soft);margin-bottom:.7rem">퀴즈 방식을 선택해주세요 🐶</p>
    <div class="mode-cards">
      <div class="mode-card active" id="mcDate" onclick="selectQuizMode('date')">
        <div class="mc-icon">📅</div><div class="mc-lbl">날짜/출처로<br>선택</div>
      </div>
      <div class="mode-card" id="mcPick" onclick="selectQuizMode('pick')">
        <div class="mc-icon">☑️</div><div class="mc-lbl">단어장에서<br>직접 선택</div>
      </div>
    </div>
    <div id="setupDate">
      <div class="filter-row">
        <select id="qDate"><option value="all">📅 전체 날짜</option></select>
        <select id="qSrc"><option value="all">📌 전체 출처</option></select>
      </div>
      <div class="pills">
        <div class="pill active" onclick="selectCount(this,5)">5개</div>
        <div class="pill" onclick="selectCount(this,10)">10개</div>
        <div class="pill" onclick="selectCount(this,999)">전체</div>
      </div>
    </div>
    <div id="setupPick" style="display:none">
      <div class="check-sel-row">
        <span id="pickSelCount">0개 선택됨</span>
        <div style="display:flex;gap:5px">
          <button class="btn btn-ghost btn-sm" onclick="pickAll()">전체선택</button>
          <button class="btn btn-ghost btn-sm" onclick="pickClear()">전체해제</button>
        </div>
      </div>
      <div class="checklist-wrap" id="pickList"></div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">🔀 퀴즈 시작!</button>
  </div>
  <div id="quizArea" style="display:none">
    <div class="prog-row"><span id="progTxt">1 / 5</span><span id="progPct">0%</span></div>
    <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="flashcard">
      <p class="card-lbl">ENGLISH WORD</p>
      <p class="card-word" id="cWord">—</p>
      <p class="card-mean" id="cMean" style="display:none"></p>
      <p class="card-src"  id="cSrc"></p>
    </div>
    <div id="btnShow" style="margin-top:.8rem">
      <button class="btn btn-secondary" onclick="showMean()">👁️ 뜻 보기</button>
    </div>
    <div id="btnJudge" style="display:none;margin-top:.8rem">
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="judge(false)">❌ 틀렸어요</button>
        <button class="btn btn-primary"   onclick="judge(true)">✅ 맞았어요</button>
      </div>
    </div>
  </div>
  <div id="quizDone" style="display:none">
    <div class="complete">
      <div class="ce">🎊</div><h3>퀴즈 완료!</h3>
      <p id="doneSummary"></p>
      <button class="btn btn-primary" onclick="resetQuiz()">🔄 다시 하기</button>
      <button class="btn btn-secondary" onclick="goWrong()" style="margin-top:.5rem">❌ 오답 보기</button>
    </div>
  </div>
</div>

<!-- TAB 4 -->

function populateFilters(){

// OCR
function previewImg(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=document.getElementById('imgPreview');
    img.src=ev.target.result; img.style.display='block';
    document.getElementById('ocrBtn').style.display='block';
    document.getElementById('ocrReview').style.display='none';
  };
  r.readAsDataURL(file);
}
async function runOCR(){
  const fi=document.getElementById('ocrFile'); if(!fi.files[0]) return;
  document.getElementById('ocrBtn').style.display='none';
  document.getElementById('ocrLoading').style.display='block';
  document.getElementById('ocrReview').style.display='none';
  try{
    const base64=await fileToBase64(fi.files[0]);
    const mediaType=fi.files[0].type||'image/jpeg';
    const res=await fetch(EDGE_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY},
      body:JSON.stringify({imageBase64:base64,mediaType})
    });
    if(!res.ok){const err=await res.json();throw new Error(err.error||'서버 오류');}
    const data=await res.json();
    if(!data.words||!data.words.length) throw new Error('추출된 단어가 없어요. 사진을 다시 찍어보세요.');
    renderReviewTable(data.words);
    document.getElementById('ocrReview').style.display='block';
    showToast('✅ '+data.words.length+'개 단어 추출 완료!');
  }catch(e){
    showToast('오류: '+e.message);
    document.getElementById('ocrBtn').style.display='block';
  }finally{
    document.getElementById('ocrLoading').style.display='none';
  }
}
function renderReviewTable(words){
  const tbody=document.getElementById('reviewBody'); tbody.innerHTML='';
  words.forEach(w=>tbody.appendChild(makeReviewRow(w.word||'',w.meaning||'')));
}
function makeReviewRow(word,meaning){
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td><input class="review-input rv-word" type="text" value="${esc(word)}" placeholder="영어 단어"/></td>
    <td><input class="review-input rv-mean" type="text" value="${esc(meaning)}" placeholder="한국어 뜻"/></td>
    <td style="text-align:center"><button class="review-del" onclick="this.closest('tr').remove()">🗑</button></td>`;
  return tr;
}
function addReviewRow(){document.getElementById('reviewBody').appendChild(makeReviewRow('',''));}

async function saveAllOCR(){
  const source=document.getElementById('ocrSource').value.trim()||null;
  const rows=document.querySelectorAll('#reviewBody tr');
  const items=[];
  rows.forEach(tr=>{
    const word=tr.querySelector('.rv-word')?.value.trim();

    if(word&&meaning) items.push({word,meaning,source});
  });
  if(!items.length){showToast('저장할 단어가 없어요!');return;}
  const{error}=await db.from('vocab').insert(items);
  if(error){showToast('저장 실패: '+error.message);return;}
  showToast('🐾 '+items.length+'개 단어 저장 완료!'); resetOCR(); await loadVocab();
}
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      res(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
    };
    img.onerror = rej;
    img.src = url;
  });
}

function renderList(){
  const words=getFiltered('listDate','listSrc');
  const container=document.getElementById('listContainer');
  const footer=document.getElementById('listFooter');
  const badge=document.getElementById('listCountBadge');
  listSelected.clear();

    container.innerHTML=`<div class="empty"><div class="ei">🐶</div><p>단어가 없어요</p></div>`;

  }

  let html=`<div class="tbl-wrap"><table class="wtbl"><thead><tr>
    <th class="td-check"><input type="checkbox" id="checkAll" onchange="toggleAllList(this)"/></th>
    <th>날짜</th><th>영어 단어</th><th>한글 뜻</th><th>출처</th><th>발음</th>
  </tr></thead><tbody>`;

    const d=w.created_at?.slice(0,10)||'';
    const src=w.source?`<span class="src-badge">${esc(w.source)}</span>`:'';
    html+=`<tr id="row-${w.id}">
      <td class="td-check"><input type="checkbox" class="row-chk" data-id="${w.id}" onchange="toggleRow(this)"/></td>
      <td style="font-size:.74rem;color:var(--soft);white-space:nowrap">${d}</td>
      <td><span class="word-en">${esc(w.word)}</span></td>
      <td style="font-size:.85rem">${esc(w.meaning)}</td>
      <td>${src}</td>
      <td><div class="sound-btns">
        <button class="snd-btn" onclick="speak('${esc(w.word)}','en-US')">🇺🇸</button>
        <button class="snd-btn" onclick="speak('${esc(w.word)}','en-GB')">🇬🇧</button>
      </div></td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  container.innerHTML=html; updateListSelInfo(words.length);
}
function toggleRow(chk){
  const id=Number(chk.dataset.id);
  if(chk.checked) listSelected.add(id); else listSelected.delete(id);
  document.getElementById('row-'+id)?.classList.toggle('selected',chk.checked);
  const all=document.querySelectorAll('.row-chk'), checked=document.querySelectorAll('.row-chk:checked');
  const ca=document.getElementById('checkAll');
  if(ca){ca.indeterminate=checked.length>0&&checked.length<all.length;ca.checked=checked.length===all.length;}
  updateListSelInfo();
}
function toggleAllList(m){
  document.querySelectorAll('.row-chk').forEach(chk=>{
    chk.checked=m.checked; const id=Number(chk.dataset.id);
    if(m.checked){listSelected.add(id);document.getElementById('row-'+id)?.classList.add('selected');}
    else{listSelected.delete(id);document.getElementById('row-'+id)?.classList.remove('selected');}
  }); updateListSelInfo();
}
function selectAllList(){const ca=document.getElementById('checkAll');if(ca){ca.checked=true;ca.indeterminate=false;}toggleAllList({checked:true});}
function clearSelList(){const ca=document.getElementById('checkAll');if(ca){ca.checked=false;ca.indeterminate=false;}toggleAllList({checked:false});}
function updateListSelInfo(total){
  const el=document.getElementById('listSelInfo'), badge=document.getElementById('listCountBadge');
  const words=getFiltered('listDate','listSrc'), t=total!==undefined?total:words.length;
  if(listSelected.size>0){el.textContent=listSelected.size+'개 선택됨';badge.textContent=`( ${listSelected.size}개 선택 / 전체 ${t}개 )`;}
  else{el.textContent='';badge.textContent=`( ${t}개 단어 )`;}
}

function speak(word,lang){

  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(word); u.lang=lang; u.rate=0.85; window.speechSynthesis.speak(u);

function selectQuizMode(mode){
  quizMode=mode;
  document.getElementById('mcDate').classList.toggle('active',mode==='date');
  document.getElementById('mcPick').classList.toggle('active',mode==='pick');
  document.getElementById('setupDate').style.display=mode==='date'?'block':'none';
  document.getElementById('setupPick').style.display=mode==='pick'?'block':'none';

function buildPickList(){
  const el=document.getElementById('pickList'); if(!el) return;
  if(!allWords.length){el.innerHTML='<div class="empty" style="padding:1rem"><p>단어를 먼저 추가해주세요</p></div>';return;}
  let html='';
  allWords.forEach(w=>{
    html+=`<label class="check-item">
      <input type="checkbox" class="pick-chk" data-id="${w.id}" onchange="updatePickCount()"/>
      <div><div class="ci-word">${esc(w.word)}</div><div class="ci-mean">${esc(w.meaning)}</div></div>
    </label>`;
  });
  el.innerHTML=html; updatePickCount();
}
function updatePickCount(){document.getElementById('pickSelCount').textContent=document.querySelectorAll('.pick-chk:checked').length+'개 선택됨';}
function pickAll(){document.querySelectorAll('.pick-chk').forEach(c=>c.checked=true);updatePickCount();}
function pickClear(){document.querySelectorAll('.pick-chk').forEach(c=>c.checked=false);updatePickCount();}
function selectCount(el,n){document.querySelectorAll('.pills .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');quizCount=n;}
function startQuiz(){
  let pool=[];
  if(quizMode==='date') pool=getFiltered('qDate','qSrc');
  else{const ids=new Set([...document.querySelectorAll('.pick-chk:checked')].map(c=>Number(c.dataset.id)));pool=allWords.filter(w=>ids.has(w.id));}
  if(!pool.length){showToast('선택된 단어가 없어요!');return;}
  const n=quizMode==='date'?Math.min(quizCount,pool.length):pool.length;
  quizWords=shuffle(pool).slice(0,n); quizIdx=0; quizOk=0; quizBad=0;
  document.getElementById('quizSetup').style.display='none';
  document.getElementById('quizArea').style.display='block';
  document.getElementById('quizDone').style.display='none';
  renderCard();
}
function renderCard(){
  if(quizIdx>=quizWords.length){showDone();return;}
  const w=quizWords[quizIdx], pct=Math.round((quizIdx/quizWords.length)*100);
  document.getElementById('progTxt').textContent=(quizIdx+1)+' / '+quizWords.length;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('cWord').textContent=w.word;
  document.getElementById('cMean').textContent=w.meaning;
  document.getElementById('cMean').style.display='none';
  document.getElementById('cSrc').textContent=w.source?'📌 '+w.source:'';
  document.getElementById('btnShow').style.display='block';
  document.getElementById('btnJudge').style.display='none';
}
function showMean(){
  document.getElementById('cMean').style.display='block';
  document.getElementById('btnShow').style.display='none';
  document.getElementById('btnJudge').style.display='block';
}
async function judge(ok){
  const w=quizWords[quizIdx];
  if(ok){quizOk++;}else{quizBad++;await recordWrong(w);}
  quizIdx++; renderCard();
}
async function recordWrong(w){
  const ex=wrongWords.find(x=>x.vocab_id===w.id);
  if(ex) await db.from('wrong_answers').update({wrong_count:ex.wrong_count+1,last_wrong_at:new Date().toISOString()}).eq('id',ex.id);
  else   await db.from('wrong_answers').insert({vocab_id:w.id,word:w.word,meaning:w.meaning,source:w.source||null,wrong_count:1});
  await loadWrong();
}
function showDone(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('quizDone').style.display='block';
  document.getElementById('doneSummary').textContent=`총 ${quizWords.length}개 | 맞은 것 ${quizOk}개 | 틀린 것 ${quizBad}개`;
}
function resetQuiz(){
  document.getElementById('quizSetup').style.display='block';
  document.getElementById('quizArea').style.display='none';
  document.getElementById('quizDone').style.display='none';
}
function goWrong(){document.querySelectorAll('.tab-btn')[3].click();resetQuiz();}
function renderWrong(){
  const sum=document.getElementById('wrongSummary'), con=document.getElementById('wrongContainer');
  if(!wrongWords.length){sum.innerHTML='';con.innerHTML=`<div class="empty"><div class="ei">🌸</div><p>오답이 없어요! 완벽해요 💕</p></div>`;return;}
  sum.innerHTML=`<div class="summary-chip">❌ 오답 단어 ${wrongWords.length}개</div>`;
  let html='';
  wrongWords.forEach(w=>{
    const d=w.last_wrong_at?.slice(0,10)||'', src=w.source?`<span class="src-badge">${esc(w.source)}</span>`:'';
    html+=`<div class="wrong-card">
      <div style="flex:1">
        <p class="wrong-word">${esc(w.word)}</p><p class="wrong-mean">${esc(w.meaning)}</p>
        <div class="wrong-meta"><span class="cnt-badge">❌ ${w.wrong_count}회 틀림</span>${src}<span>마지막: ${d}</span></div>
      </div>
      <div><button class="btn btn-outline btn-sm" onclick="openModal(${w.id},'${esc(w.word)}')">✅ 암기완료</button></div>
    </div>`;
  });
  con.innerHTML=html;
}
function openModal(id,word){
  masterId=id; masterWord=word;
  document.getElementById('modalDesc').textContent=`"${word}"을(를) 오답노트에서 삭제할까요?\n(단어장 원본은 유지됩니다)`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');masterId=null;}
async function confirmMaster(){
  if(!masterId) return;
  await db.from('wrong_answers').delete().eq('id',masterId);
  closeModal(); showToast('🎊 '+masterWord+' 암기완료!'); await loadWrong();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}
</script>
